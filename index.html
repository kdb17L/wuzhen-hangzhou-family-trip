<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#176b5b">
  <title>乌镇＋杭州｜家庭旅行行动清单</title>
  <style>
    :root {
      --green: #176b5b;
      --green-dark: #0f4d42;
      --green-soft: #e7f3ef;
      --orange: #d86d28;
      --orange-soft: #fff1e6;
      --ink: #1f2a27;
      --muted: #62706c;
      --line: #d8e1de;
      --paper: #ffffff;
      --page: #f3f6f5;
      --shadow: 0 6px 22px rgba(22, 59, 51, .08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100vw; scroll-behavior: smooth; background: var(--page); }
    body {
      width: 100%;
      max-width: 100vw;
      margin: 0;
      color: var(--ink);
      background: var(--page);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 17px;
      line-height: 1.58;
      overflow-x: hidden;
    }
    button, a { font: inherit; }
    button { color: inherit; }
    a { color: inherit; }
    .app { width: 100%; max-width: 720px; margin: 0 auto; padding-bottom: 94px; overflow-x: hidden; }
    .top-shell {
      position: sticky;
      top: 0;
      z-index: 30;
      background: var(--page);
      border-bottom: 1px solid var(--line);
    }
    .brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 16px 8px;
      color: var(--green-dark);
      font-size: 15px;
      font-weight: 800;
      overflow: hidden;
    }
    .brand > span, .brand small { min-width: 0; white-space: nowrap; }
    .brand small { color: var(--muted); font-size: 12px; font-weight: 650; }
    .date-tabs {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      overscroll-behavior-inline: contain;
      scrollbar-width: none;
      padding: 5px 16px 12px;
      max-width: 100vw;
    }
    .date-tabs::-webkit-scrollbar { display: none; }
    .date-tab {
      flex: 0 0 auto;
      min-width: 76px;
      min-height: 48px;
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--paper);
      font-weight: 800;
      cursor: pointer;
    }
    .date-tab span { display: block; color: var(--muted); font-size: 13px; font-weight: 650; }
    .date-tab.active { color: #fff; background: var(--green); border-color: var(--green); box-shadow: var(--shadow); }
    .date-tab.active span { color: #d9f1ea; }
    main { width: 100%; max-width: 100%; padding: 14px 14px 0; }
    section { scroll-margin-top: 132px; }
    .card {
      width: 100%;
      max-width: 100%;
      margin-bottom: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }
    .overview {
      color: #fff;
      background: linear-gradient(145deg, var(--green-dark), var(--green));
      border: 0;
    }
    .eyebrow { margin: 0 0 4px; font-size: 15px; font-weight: 800; opacity: .88; }
    h1 { margin: 0; font-size: clamp(25px, 7vw, 34px); line-height: 1.24; }
    .theme { margin: 6px 0 16px; color: #d7f2ea; font-size: 19px; font-weight: 700; }
    .overview-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.35fr); gap: 10px; }
    .overview-item { min-width: 0; padding: 11px; border-radius: 13px; background: rgba(255,255,255,.11); }
    .overview-item.wide { grid-column: 1 / -1; }
    .label { display: block; margin-bottom: 2px; color: inherit; opacity: .77; font-size: 14px; font-weight: 700; }
    .value { display: block; min-width: 0; font-weight: 800; overflow-wrap: anywhere; word-break: break-word; }
    .mode-note { margin: 12px 0 0; color: #d7f2ea; font-size: 14px; }
    .now-card { border: 2px solid var(--orange); background: #fffdfa; }
    .section-kicker { margin: 0 0 10px; color: var(--green); font-size: 15px; font-weight: 900; letter-spacing: .03em; }
    .now-grid { display: grid; gap: 10px; }
    .action-row { padding: 13px 14px; border-radius: 14px; background: #f6f8f7; }
    .action-row.current { color: #fff; background: var(--orange); }
    .action-row.next { background: var(--orange-soft); border: 1px solid #f1c7a7; }
    .action-label { display: block; margin-bottom: 2px; font-size: 14px; font-weight: 900; opacity: .8; }
    .action-time { font-size: 22px; font-weight: 900; line-height: 1.2; }
    .action-title { margin-left: 6px; font-size: 18px; font-weight: 800; }
    .action-place { display: block; margin-top: 3px; font-size: 15px; opacity: .82; }
    .section-head { display: flex; align-items: end; justify-content: space-between; gap: 12px; margin: 24px 2px 10px; }
    .section-head h2 { margin: 0; color: var(--green-dark); font-size: 23px; }
    .section-head p { margin: 0; color: var(--muted); font-size: 14px; }
    .timeline { position: relative; display: grid; gap: 12px; }
    .timeline::before { content: ""; position: absolute; left: 24px; top: 20px; bottom: 20px; width: 2px; background: var(--line); }
    .timeline-item {
      position: relative;
      margin-left: 12px;
      padding: 16px 15px 15px 50px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }
    .timeline-dot { position: absolute; left: 3px; top: 21px; width: 20px; height: 20px; border: 5px solid var(--paper); border-radius: 50%; background: #93a29e; box-shadow: 0 0 0 2px var(--line); }
    .timeline-item.current { border: 2px solid var(--orange); background: #fffaf6; }
    .timeline-item.current .timeline-dot { background: var(--orange); box-shadow: 0 0 0 3px #ffd7ba; }
    .timeline-item.next { border-color: var(--green); background: var(--green-soft); }
    .timeline-item.next .timeline-dot { background: var(--green); box-shadow: 0 0 0 3px #bfe3d8; }
    .timeline-item.done { opacity: .56; box-shadow: none; }
    .timeline-item.uncertain { border-style: dashed; }
    .timeline-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .timeline-time { color: var(--green-dark); font-size: 23px; font-weight: 900; }
    .status { flex: 0 0 auto; padding: 4px 9px; border-radius: 999px; background: #edf1f0; color: var(--muted); font-size: 13px; font-weight: 900; }
    .status.current { color: #fff; background: var(--orange); }
    .status.next { color: #fff; background: var(--green); }
    .timeline-item h3 { margin: 6px 0 7px; font-size: 20px; line-height: 1.35; }
    .facts { display: grid; gap: 4px; margin: 0; color: var(--muted); font-size: 15px; }
    .facts strong { color: var(--ink); }
    .btn-row { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 13px; }
    .btn {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 9px 14px;
      border: 1px solid var(--green);
      border-radius: 12px;
      background: var(--paper);
      color: var(--green-dark);
      font-weight: 850;
      text-decoration: none;
      cursor: pointer;
    }
    .btn.primary { color: #fff; background: var(--green); }
    .btn.soft { border-color: var(--line); color: var(--ink); background: #f5f7f6; }
    .btn:focus-visible, summary:focus-visible, .date-tab:focus-visible { outline: 3px solid #f2ae79; outline-offset: 2px; }
    details.guide, details.ticket-box, details.confirm-box {
      margin-bottom: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }
    details > summary { min-height: 52px; padding: 15px 17px; cursor: pointer; font-weight: 900; list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    details > summary::after { content: "＋"; float: right; color: var(--green); font-size: 22px; line-height: 1; }
    details[open] > summary::after { content: "－"; }
    .guide-summary small { display: block; margin-top: 2px; color: var(--muted); font-size: 14px; font-weight: 650; }
    .guide-body, .details-body { padding: 0 17px 17px; }
    .guide-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 14px; }
    .mini { padding: 10px; border-radius: 12px; background: #f4f7f6; font-size: 15px; }
    .mini strong { display: block; color: var(--green-dark); }
    .guide-body h4 { margin: 14px 0 4px; color: var(--green-dark); font-size: 17px; }
    .guide-body ul, .details-body ul { margin: 5px 0 0; padding-left: 22px; }
    .student-task { margin-top: 13px; padding: 11px 13px; border-radius: 12px; background: var(--orange-soft); }
    .ticket-list { display: grid; gap: 10px; }
    .ticket-item { padding: 14px; border: 1px solid var(--line); border-radius: 14px; background: #fbfcfc; }
    .ticket-item h3 { margin: 0 0 7px; font-size: 18px; }
    .ticket-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 12px; color: var(--muted); font-size: 15px; }
    .ticket-grid .wide { grid-column: 1 / -1; }
    .ticket-grid strong { color: var(--ink); }
    .info-grid { display: grid; gap: 10px; }
    .info-item { padding: 13px 14px; border-radius: 14px; background: #f4f7f6; }
    .info-item strong { display: block; color: var(--green-dark); }
    .contact { border: 1px dashed #9cb4ad; background: var(--green-soft); }
    .confirm-box { margin-top: 28px; }
    .source-note { color: var(--muted); font-size: 14px; }
    .bottom-nav {
      position: fixed;
      z-index: 40;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      width: 100%;
      max-width: 720px;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.97);
      box-shadow: 0 -8px 24px rgba(30, 56, 49, .09);
    }
    .bottom-nav a { min-height: 50px; padding: 5px 3px; color: var(--muted); font-size: 14px; font-weight: 800; text-align: center; text-decoration: none; }
    .bottom-nav span { display: block; font-size: 20px; line-height: 1.15; }
    dialog { width: min(calc(100% - 32px), 480px); padding: 0; border: 0; border-radius: 18px; box-shadow: 0 24px 80px rgba(0,0,0,.28); }
    dialog::backdrop { background: rgba(11, 30, 26, .55); }
    .dialog-body { padding: 22px; }
    .dialog-body h2 { margin: 0 0 8px; color: var(--green-dark); }
    .dialog-body p { margin: 0 0 17px; }
    @media (min-width: 600px) {
      main { padding-inline: 20px; }
      .info-grid { grid-template-columns: 1fr 1fr; }
      .info-item.wide { grid-column: 1 / -1; }
    }
    @media (max-width: 420px) {
      .brand small { display: none; }
      main { padding-top: 10px; }
      .card { margin-bottom: 12px; padding: 14px; }
      .overview { padding: 15px; }
      .overview h1 { font-size: 29px; }
      .theme { margin: 3px 0 10px; font-size: 18px; }
      .overview-grid { gap: 8px; }
      .overview-item { padding: 8px 9px; }
      .label { font-size: 13px; }
      .value { font-size: 16px; line-height: 1.42; }
      .mode-note { display: none; }
      .now-card { padding: 13px 14px; }
      .section-kicker { margin-bottom: 7px; }
      .now-grid { gap: 8px; }
      .action-row { padding: 10px 12px; }
      .action-time { font-size: 20px; }
      .action-title { font-size: 17px; }
      .action-place { margin-top: 1px; font-size: 14px; }
    }
    @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
  </style>
</head>

    </main>
  </div>

    renderAll();
    window.setInterval(() => { if (tripDays[selectedIndex].date === todayIso()) renderAll(); }, 60000);
  </script>
</body>
